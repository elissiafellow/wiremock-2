apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wiremock

configMapGenerator:
  - name: wiremock-fawry-mappings-configs
    files:
      - api-test.json=mappings/api-test.json
      - root.json=mappings/root.json
    options:
      labels:
        app: wiremock-fawry
        component: mappings
      disableNameSuffixHash: true
  
  - name: wiremock-fawry-responses-configs
    files:
      - large-response.json=responses/large-response.json
    options:
      labels:
        app: wiremock-fawry
        component: responses
      disableNameSuffixHash: true